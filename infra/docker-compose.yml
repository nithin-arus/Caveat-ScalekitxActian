services:
  caveat-actian:
    image: ${ACTIAN_IMAGE:-actian/vectorai:latest}
    container_name: caveat-actian
    profiles: ["actian"]
    environment:
      ACTIAN_VECTORAI_ACCEPT_EULA: ${ACTIAN_VECTORAI_ACCEPT_EULA:-YES}
    ports:
      - "6573:6573"
      - "${ACTIAN_PORT:-6574}:6574"
      - "6575:6575"
    volumes:
      - caveat-actian-data:/var/lib/actian-vectorai
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/lib/actian-vectorai"]
      interval: 30s
      timeout: 5s
      retries: 3

  caveat-redis:
    image: redis:7-alpine
    container_name: caveat-redis
    ports:
      - "6379:6379"
    volumes:
      - caveat-redis-data:/data

volumes:
  caveat-actian-data:
  caveat-redis-data:
