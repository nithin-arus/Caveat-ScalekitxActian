services:
  - type: web
    name: caveat-web
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: /opt/render/project/src/data }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - { key: ANTHROPIC_API_KEY, sync: false }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: worker
    name: caveat-agent
    runtime: node
    rootDir: worker
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: /opt/render/project/src/data }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - { key: ANTHROPIC_API_KEY, sync: false }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: pserv
    name: caveat-actian
    runtime: image
    image: { url: "ACTIAN_IMAGE_TODO" }
    disk: { name: actian-data, mountPath: /var/lib/actian, sizeGB: 1 }
    envVars:
      - { key: ACTIAN_DATABASE, value: caveat }
      - { key: ACTIAN_USER, value: caveat }
      - { key: ACTIAN_PASSWORD, sync: false }

  - type: cron
    name: caveat-watch
    runtime: node
    rootDir: cron
    schedule: "*/30 * * * *"
    buildCommand: npm install
    startCommand: npm run watch
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: /opt/render/project/src/data }
      - { key: WATCH_DRY_RUN, value: "false" }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: keyvalue
    name: caveat-queue
    plan: free
