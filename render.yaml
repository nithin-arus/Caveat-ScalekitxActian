services:
  - type: web
    name: caveat-web
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: ../data }
      - { key: CAVEAT_QUEUE_FILE, value: ../data/generated/watch_jobs.jsonl }
      - { key: CAVEAT_RESULTS_FILE, value: ../data/generated/worker_results.json }
      - { key: ACTIAN_VECTOR_DIMENSIONS, value: "384" }
      - { key: ACTIAN_PLAYBOOK_COLLECTION, value: clause_playbook }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - { key: SCALEKIT_DEFAULT_CONNECTIONS, value: gmail,googledrive }
      - { key: SCALEKIT_READ_ONLY_SCOPE, value: openid,profile,email,read }
      - { key: SCALEKIT_ACT_SCOPE, value: openid,profile,email,read,send }
      - { key: ANTHROPIC_API_KEY, sync: false }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: worker
    name: caveat-agent
    runtime: node
    rootDir: worker
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: ../data }
      - { key: CAVEAT_QUEUE_FILE, value: ../data/generated/watch_jobs.jsonl }
      - { key: CAVEAT_RESULTS_FILE, value: ../data/generated/worker_results.json }
      - { key: ACTIAN_VECTOR_DIMENSIONS, value: "384" }
      - { key: ACTIAN_PLAYBOOK_COLLECTION, value: clause_playbook }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - { key: SCALEKIT_DEFAULT_CONNECTIONS, value: gmail,googledrive }
      - { key: ANTHROPIC_API_KEY, sync: false }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: pserv
    name: caveat-actian
    runtime: image
    image: { url: "actian/vectorai:latest" }
    disk: { name: actian-data, mountPath: /var/lib/actian-vectorai, sizeGB: 1 }
    envVars:
      - { key: ACTIAN_VECTORAI_ACCEPT_EULA, value: "YES" }

  - type: cron
    name: caveat-watch
    runtime: node
    rootDir: cron
    schedule: "*/30 * * * *"
    buildCommand: npm install
    startCommand: npm run watch
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: CAVEAT_DATA_DIR, value: ../data }
      - { key: CAVEAT_QUEUE_FILE, value: ../data/generated/watch_jobs.jsonl }
      - { key: CAVEAT_RESULTS_FILE, value: ../data/generated/worker_results.json }
      - { key: WATCH_DRY_RUN, value: "false" }
      - { key: ACTIAN_VECTOR_DIMENSIONS, value: "384" }
      - { key: ACTIAN_PLAYBOOK_COLLECTION, value: clause_playbook }
      - { key: SCALEKIT_ENV_URL, sync: false }
      - { key: SCALEKIT_CLIENT_ID, sync: false }
      - { key: SCALEKIT_CLIENT_SECRET, sync: false }
      - { key: SCALEKIT_DEFAULT_CONNECTIONS, value: gmail,googledrive }
      - key: ACTIAN_URL
        fromService: { type: pserv, name: caveat-actian, property: hostport }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: caveat-queue, property: connectionString }

  - type: keyvalue
    name: caveat-queue
    plan: free
